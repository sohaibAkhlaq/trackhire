<app-sidebar></app-sidebar>
<app-navbar></app-navbar>

<div class="main-content">
  <div class="profile-container">
    <div class="profile-card">
      <div class="profile-cover"></div>
      <div class="profile-info">
        <div class="profile-avatar">
          <span>{{ userInitials }}</span>
        </div>
        <h2>{{ userName || 'User' }}</h2>
        <p>{{ userEmail || 'user@email.com' }}</p>
      </div>
      <div class="profile-stats">
        <div class="profile-stat">
          <span class="profile-stat-number">{{ totalApplications }}</span>
          <span class="profile-stat-label">Total Applications</span>
        </div>
        <div class="profile-stat">
          <span class="profile-stat-number">{{ memberSince }}</span>
          <span class="profile-stat-label">Member Since</span>
        </div>
      </div>
      <div class="profile-actions">
        <button class="logout-btn" (click)="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Logout
        </button>
      </div>
    </div>
  </div>
</div>
