<div class="login-container">
  <div class="login-card">
    <div class="login-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <h1>Welcome back</h1>
    <p>Log in to track your applications</p>

    <div *ngIf="error" class="error-message">{{ error }}</div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="hello&#64;company.com" (keyup.enter)="onLogin()">
    </div>

    <div class="input-group">
      <div class="password-header">
        <label>Password</label>
        <a href="#">Forgot password?</a>
      </div>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="onLogin()">
    </div>

    <button class="login-btn" (click)="onLogin()" [disabled]="loading">
      <span *ngIf="loading" class="spinner"></span>
      {{ loading ? 'Signing in...' : 'Sign in' }}
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span>Or continue with</span>
      <div class="divider-line"></div>
    </div>

    <button class="google-btn" (click)="onGoogleLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span>Google</span>
    </button>

    <p class="signup-link">
      Don't have an account?
      <a routerLink="/register">Sign up</a>
    </p>
  </div>
</div>
